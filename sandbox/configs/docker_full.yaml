# docker_full.yaml -- Test configuration for full (Docker-in-Docker) isolation.
#
# Selected when SANDBOX_CONFIG=docker_full.
# The server runs inside a Docker container and spawns sibling execution
# containers via the mounted Docker socket.

sandbox:
  isolation: full
  max_concurrency: 16
  docker_image: ineil77/sandbox-fusion-server:25042026-2
  default_memory_limit_mb: 8192
  default_cpu_limit: 2

eval:
  max_runner_concurrency: 3

common:
  logging_color: true
