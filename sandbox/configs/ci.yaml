# ci.yaml -- Configuration for continuous-integration environments.
#
# Selected when SANDBOX_CONFIG=ci.
# Key difference from local.yaml: max_concurrency is 0, meaning the
# internal concurrency limiter is disabled because CI parallelism is
# managed externally by pytest-xdist.

sandbox:
  # Isolation mode: "lite" (overlayfs + chroot + cgroups) or "full" (Docker).
  isolation: lite
  # Concurrency in CI is limited by pytest-xdist, so set to 0 (unlimited
  # from the sandbox's perspective).
  max_concurrency: 0
  # Docker image used when isolation is "full".
  docker_image: ineil77/sandbox-fusion-server:24042026-2
  # Default memory limit per sandbox execution (MB). Overridden by per-request memory_limit_MB.
  default_memory_limit_mb: 8192
  # Default CPU core limit per sandbox execution.
  default_cpu_limit: 2

eval:
  # Maximum number of test cases evaluated in parallel by the runner.
  max_runner_concurrency: 3

common:
  # Enable ANSI colour codes in log output.
  logging_color: true
